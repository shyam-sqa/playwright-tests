name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true 

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test
      

    - name: Extract Test Summary
      if: always()
      id: test-summary
      run: |
        # Ensure the results file exists to prevent script crashes
        if [ ! -f results.json ]; then
          echo '{"stats":{"expected":0,"unexpected":0,"flaky":0}}' > results.json
        fi

        # Extract values using jq with a fallback to 0
        PASSED=$(jq -r '.stats.expected // 0' results.json)
        FAILED=$(jq -r '.stats.unexpected // 0' results.json)
        FLAKY=$(jq -r '.stats.flaky // 0' results.json)

        # Logic for Slack Color & Status Text
        if [ "$FAILED" -eq 0 ]; then
          echo "color=good" >> $GITHUB_OUTPUT
          echo "status_text=✅ Passed" >> $GITHUB_OUTPUT
        else
          echo "color=danger" >> $GITHUB_OUTPUT
          echo "status_text=❌ Failed" >> $GITHUB_OUTPUT
        fi

        # Export variables for the Slack step
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        echo "flaky=$FLAKY" >> $GITHUB_OUTPUT

    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Create Allure Environment File
      if: always()
      run: |
        mkdir -p allure-results
        echo "Executor=${{ github.actor }}" >> allure-results/environment.properties
        echo "Branch=${{ github.ref_name }}" >> allure-results/environment.properties
        echo "Commit=${{ github.event.head_commit.message }}" >> allure-results/environment.properties
        echo "Environment=GitHub_Actions_Ubuntu" >> allure-results/environment.properties

    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20
        report_name: "Build: ${{ github.run_number }}"

    - name: Deploy report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history  
        keep_files: true
          
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    
    - name: Slack Notification
      uses: rtCamp/action-slack-notify@v2
      if: always() 
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_USERNAME: PlaywrightBot
        SLACK_ICON: https://playwright.dev/img/playwright-logo.svg
        SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
        SLACK_TITLE: "Execution: ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }}"
        SLACK_MESSAGE: |
          *Stats:* ✅ ${{ steps.test-summary.outputs.passed }} | ❌ ${{ steps.test-summary.outputs.failed }} | ⚠️ ${{ steps.test-summary.outputs.flaky }}
          *Branch:* `${{ github.ref_name }}`
          *Commit:* ${{ github.event.head_commit.message || github.event.pull_request.title }}
          *Author:* ${{ github.actor }} 
          *Report:* https://shyam-sqa.github.io/${{ github.event.repository.name }}/${{ github.run_number }}/
          *Result:* ${{ job.status == 'success' && 'Deployment Ready 🚀' || 'Blocked ❌' }}
        MSG_MINIMAL: true