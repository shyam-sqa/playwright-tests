name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true 

jobs:

  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Smoke Tests
        run: npx playwright test --grep @smoke

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            results.json
            playwright-report/

  full-tests:
    runs-on: ubuntu-latest
    needs: smoke-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Full Tests
        run: npx playwright test

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-results
          path: |
            results.json
            playwright-report/

  report:
    runs-on: ubuntu-latest
    needs: [smoke-tests, full-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download Smoke Results
        uses: actions/download-artifact@v4
        with:
          name: smoke-results
          path: results
        continue-on-error: true

      - name: Download Full Results
        uses: actions/download-artifact@v4
        with:
          name: full-results
          path: results
        continue-on-error: true

      - name: Ensure report folder exists
        run: |
          mkdir -p results
          if [ ! -f results/results.json ]; then
            echo '{"stats":{"expected":0,"unexpected":0,"flaky":0}}' > results/results.json
          fi

      - name: Extract summary
        id: summary
        run: |
          PASSED=$(jq -r '.stats.expected // 0' results/results.json)
          FAILED=$(jq -r '.stats.unexpected // 0' results/results.json)
          FLAKY=$(jq -r '.stats.flaky // 0' results/results.json)

          if [ "$FAILED" -eq 0 ]; then
            echo "color=good" >> $GITHUB_OUTPUT
            echo "status=✅ Passed" >> $GITHUB_OUTPUT
          else
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
          fi

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "flaky=$FLAKY" >> $GITHUB_OUTPUT



      - name: Generate Playwright HTML Report
        run: npx playwright show-report --reporter=html || true

      - name: Build publish structure
        run: |
          rm -rf publish
          mkdir -p publish/latest
          mkdir -p publish/history/${{ github.run_number }}

          # fallback if no report exists
          if [ -d playwright-report ]; then
            cp -r playwright-report/* publish/latest/
            cp -r playwright-report/* publish/history/${{ github.run_number }}/
          fi

          # create index redirect safety
          echo '<meta http-equiv="refresh" content="0; url=./latest/">' > publish/index.html



      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: publish
          force_orphan: true



      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: PlaywrightBot
          SLACK_ICON: https://playwright.dev/img/playwright-logo.svg
          SLACK_COLOR: ${{ steps.summary.outputs.color }}
          SLACK_TITLE: "Execution: ${{ steps.summary.outputs.status }}"
          SLACK_MESSAGE: |
            *Stats:* ✅ ${{ steps.summary.outputs.passed }} | ❌ ${{ steps.summary.outputs.failed }} | ⚠️ ${{ steps.summary.outputs.flaky }}
            *Branch:* `${{ github.ref_name }}`
            *Author:* ${{ github.actor }}
            *Report:* https://shyam-sqa.github.io/${{ github.event.repository.name }}/latest/
            *Result:* ${{ steps.summary.outputs.failed == '0' && 'Deployment Ready 🚀' || 'Blocked ❌' }}
          MSG_MINIMAL: true